<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#141416" />
    <title>Offline — ONRAJ</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        background: #141416;
        color: #ece7df;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        padding-bottom: calc(2rem + env(safe-area-inset-bottom));
        text-align: center;
      }
      .lockup {
        display: inline-flex;
        align-items: flex-end;
        font-weight: 800;
        font-size: 2rem;
        letter-spacing: -0.03em;
        margin-bottom: 1.75rem;
      }
      .dot {
        width: 0.38rem;
        height: 0.38rem;
        margin: 0 0 0.42rem 0.18rem;
        border-radius: 9999px;
        background: #3d68be;
      }
      h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.01em; }
      p {
        margin-top: 0.6rem;
        max-width: 22rem;
        line-height: 1.55;
        color: #8c8884;
        font-size: 0.95rem;
      }
      button {
        margin-top: 1.75rem;
        padding: 0.7rem 1.5rem;
        background: #3d68be;
        color: #fff;
        border: none;
        border-radius: 0.75rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:active { transform: scale(0.98); }
    </style>
  </head>
  <body>
    <div class="lockup">ONRAJ<span class="dot"></span></div>
    <h1>Je bent offline</h1>
    <p>
      Geen internetverbinding. Eerder geladen pagina's blijven beschikbaar;
      nieuwe gegevens kunnen pas weer worden opgehaald als je online bent.
    </p>
    <button onclick="window.location.reload()">Opnieuw proberen</button>
  </body>
</html>
